<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        padding: 20px;
        min-width: 320px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        color: #111;
        background: #fff;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 16px;
        font-weight: 600;
      }
      fieldset {
        margin: 0 0 16px;
        padding: 12px 14px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
      }
      legend {
        padding: 0 4px;
        font-weight: 600;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
        cursor: pointer;
      }
      #note {
        min-height: 18px;
        font-size: 13px;
        color: #10a37f;
      }
      #note.error {
        color: #b00020;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
