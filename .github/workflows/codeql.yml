name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly-published queries catch regressions even without a push.
    - cron: '17 6 * * 1'

# Cancel superseded runs on the same ref.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      # Required to upload scan results to the Security tab.
      security-events: write
      # Least privilege for the rest.
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # No compiled languages here — analyze the source directly.
          build-mode: none
          # Prioritise security-relevant queries (data-flow to network sinks);
          # this is what the regex privacy gate cannot see semantically.
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
